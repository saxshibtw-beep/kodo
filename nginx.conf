server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    # Cache static assets
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # Redirect .html URLs to clean URLs — permanent 301
    rewrite ^/index\.html$ / permanent;
    rewrite ^/about\.html$ /about permanent;
    rewrite ^/contact\.html$ /contact permanent;
    rewrite ^/faq\.html$ /faq permanent;
    rewrite ^/terms\.html$ /terms permanent;
    rewrite ^/privacy\.html$ /privacy permanent;
    rewrite ^/shipping\.html$ /shipping permanent;

    # Serve clean URLs by trying .html file
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # 404 fallback
    error_page 404 /index.html;
}
